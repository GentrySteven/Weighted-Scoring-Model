# =============================================================================
# archivesspace-accession-sync Configuration
# =============================================================================
# This file contains all non-sensitive settings for the sync tool.
# For credentials and API keys, see credentials.yml (not tracked in git).
#
# YAML Syntax Reminders:
#   - Indentation matters (use spaces, not tabs)
#   - Strings with special characters should be quoted
#   - Comments start with #
# =============================================================================

# -----------------------------------------------------------------------------
# ArchivesSpace Connection
# -----------------------------------------------------------------------------
archivesspace:
  # The base URL of your ArchivesSpace API endpoint.
  # This is typically NOT the same as the staff interface URL.
  # Common patterns:
  #   - Hosted/cloud: https://your-instance.archivesspace.org/api
  #   - Self-hosted:  http://localhost:8089
  # Replace this URL with your institution's ArchivesSpace API endpoint.
  base_url: "https://sandbox.archivesspace.org/api"

  # The numeric ID of the repository to sync.
  # Find this in the URL when viewing your repository in the staff interface:
  #   https://your-instance.archivesspace.org/repositories/2
  # The number at the end is the repository ID.
  repository_id: 2

# -----------------------------------------------------------------------------
# Output Format
# -----------------------------------------------------------------------------
output:
  # Choose your output format: "excel" or "google_sheets"
  format: "excel"

  # The name of the spreadsheet.
  # This name is used for both Excel files and Google Sheets.
  spreadsheet_name: "Accession Data and Scores"

# -----------------------------------------------------------------------------
# Excel Settings (only used when output.format is "excel")
# -----------------------------------------------------------------------------
excel:
  # Full path to the directory where the Excel file should be saved.
  # Windows example: "C:\\Users\\YourName\\Documents\\accession-sync"
  # macOS/Linux example: "/home/yourname/documents/accession-sync"
  target_directory: ""

# -----------------------------------------------------------------------------
# Google Sheets Settings (only used when output.format is "google_sheets")
# -----------------------------------------------------------------------------
google_sheets:
  # The Google Drive folder ID where the spreadsheet should be created.
  # Find this in the URL when viewing the folder in Google Drive:
  #   https://drive.google.com/drive/folders/THIS_IS_THE_FOLDER_ID
  # Leave blank to use your root Drive folder.
  folder_id: ""

  # The URL of an existing Google Sheet to sync to.
  # If blank, the tool will create a new spreadsheet during the first run.
  spreadsheet_url: ""

  # Sharing permissions applied when the spreadsheet is created
  # and re-verified on each subsequent run.
  # Each entry specifies an email, a role, and whether to send a notification.
  # Roles: reader, commenter, writer
  sharing:
    # - email: "colleague@university.edu"
    #   role: "writer"
    #   notify: true

# -----------------------------------------------------------------------------
# Linked Agent Configuration
# -----------------------------------------------------------------------------
agents:
  # The agent role to extract for the Donor Name column.
  # Default: "source". Other common values: "creator"
  # Only one role is used at a time.
  donor_role: "source"

# -----------------------------------------------------------------------------
# Extent Type Configuration
# -----------------------------------------------------------------------------
# These mappings are populated during the first-run setup wizard.
# Each extent type is categorized as "physical" or "digital" with a
# conversion factor to the standard unit (linear feet or gigabytes).
extent_types: {}
  # Example:
  # "linear_feet":
  #   category: "physical"
  #   conversion_factor: 1.0
  # "cubic_feet":
  #   category: "physical"
  #   conversion_factor: 1.0
  # "gigabytes":
  #   category: "digital"
  #   conversion_factor: 1.0
  # "megabytes":
  #   category: "digital"
  #   conversion_factor: 0.001

# -----------------------------------------------------------------------------
# Format Detection Keywords
# -----------------------------------------------------------------------------
# Each format column has a list of keywords used to detect that material type.
# These are populated during setup and can be customized at any time.
format_keywords:
  "Architectural Drawing(s)":
    - "architectural drawing"
    - "blueprint"
    - "floor plan"
  "Artifact(s)":
    - "artifact"
    - "object"
    - "memorabilia"
  "Artwork":
    - "artwork"
    - "painting"
    - "print"
    - "drawing"
    - "sketch"
  "Audio and/or Visual Recording(s)":
    - "audio"
    - "video"
    - "recording"
    - "cassette"
    - "reel-to-reel"
  "Botanical Specimen(s)":
    - "botanical"
    - "plant"
    - "herbarium"
  "Film (negative, slide, or motion picture)":
    - "film"
    - "negative"
    - "slide"
    - "motion picture"
    - "nitrate"
    - "acetate"
  "Glass Material(s)":
    - "glass"
    - "plate negative"
    - "lantern slide"
  "Photographic Material(s)":
    - "photograph"
    - "photo"
    - "daguerreotype"
    - "tintype"
    - "carte de visite"
  "Scrapbook(s)":
    - "scrapbook"
  "Technical Drawing(s) and Schematic(s)":
    - "technical drawing"
    - "schematic"
    - "diagram"
    - "engineering drawing"
  "Textile(s)":
    - "textile"
    - "fabric"
    - "quilt"
    - "clothing"
    - "garment"
  "Vellum and Parchment":
    - "vellum"
    - "parchment"
  "Volume(s)":
    - "volume"
    - "bound"
    - "ledger"
    - "journal"
    - "diary"
  "Oversize Material?":
    - "oversize"
    - "oversized"
    - "flat file"

# -----------------------------------------------------------------------------
# Removable Media Keywords (for Digital Issues detection)
# -----------------------------------------------------------------------------
removable_media_keywords:
  - "floppy disk"
  - "floppy"
  - "3.5 inch disk"
  - "5.25 inch disk"
  - "diskette"
  - "CD"
  - "CD-ROM"
  - "CD-R"
  - "CD-RW"
  - "DVD"
  - "DVD-ROM"
  - "DVD-R"
  - "Blu-ray"
  - "hard drive"
  - "external hard drive"
  - "flash drive"
  - "USB"
  - "thumb drive"
  - "zip disk"
  - "zip drive"
  - "tape"
  - "DAT"
  - "LTO"
  - "data tape"
  - "magnetic tape"
  - "memory card"
  - "SD card"
  - "CompactFlash"
  - "MiniDisc"
  - "Jaz disk"
  - "SyQuest"

# -----------------------------------------------------------------------------
# Matching Configuration
# -----------------------------------------------------------------------------
matching:
  # Enable fuzzy matching for keyword detection using RapidFuzz.
  fuzzy_enabled: false

  # Similarity threshold (0-100). Higher values = stricter matching.
  # 85 is a good starting point; lower for messier data, higher for cleaner data.
  fuzzy_threshold: 85

# -----------------------------------------------------------------------------
# Subject Descriptor Configuration
# -----------------------------------------------------------------------------
subject_descriptors:
  # Number of Subject Descriptor columns in the spreadsheet.
  num_columns: 9

# -----------------------------------------------------------------------------
# Issue Columns Configuration
# -----------------------------------------------------------------------------
# Scan configurations for issue columns can be defined here.
# These are typically set up through the wizard or interactive menu.
issue_scan_configs: {}

# Default options for Documentation and Use Issues dropdown
documentation_use_issues_options:
  - "Material is actually or possibly on deposit."
  - "Material may or does lack a gift agreement."
  - "Other issues."

# Default options for Kind of Processing Project dropdown
processing_project_types:
  - "Accessioning as Processing"
  - "Backlog"
  - "Requested"
  - "Cataloging"
  - "Unknown"

# -----------------------------------------------------------------------------
# Completion Trigger Values
# -----------------------------------------------------------------------------
# Processing status values that indicate an accession has been completed.
# Configured during setup; the tool imports available values from ArchivesSpace.
completion_triggers: []
  # Example:
  # - "completed"
  # - "processed"

# -----------------------------------------------------------------------------
# Throttling
# -----------------------------------------------------------------------------
throttling:
  # Delay in seconds between API requests.
  # Increase these values if your server is shared or under heavy load.
  archivesspace: 0.5
  google_sheets: 1.0
  google_drive: 0.5

  # Use batch mode for Google Sheets API calls.
  # Batch mode sends all changes in a single API call (recommended).
  batch_mode: true

# -----------------------------------------------------------------------------
# Network Retry Settings
# -----------------------------------------------------------------------------
retry:
  # Number of retry attempts for failed network requests.
  # Uses exponential backoff: 1s, 2s, 4s, 8s, 16s
  max_retries: 5

  # Excel file lock retry settings.
  file_lock_retries: 5
  file_lock_interval: 60  # seconds between retries

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging:
  # Log detail level: "minimal", "standard", or "verbose"
  level: "standard"

  # Directory where log files are stored.
  directory: ""

  # How frequently individual logs are consolidated.
  # Options: "weekly", "monthly", "none"
  consolidation_frequency: "weekly"

  # Days to keep individual logs after consolidation.
  grace_period_days: 3

  # How long to retain logs overall. "indefinite" or number of days.
  retention: "indefinite"

  # Days logs remain in archive before permanent deletion.
  archive_review_window_days: 30

  # Warn when total log storage exceeds this threshold (in MB).
  storage_warning_threshold_mb: 1024

# -----------------------------------------------------------------------------
# Cache
# -----------------------------------------------------------------------------
cache:
  # Directory where the accession data cache is stored.
  directory: ""

# -----------------------------------------------------------------------------
# Preview (Dry Run)
# -----------------------------------------------------------------------------
preview:
  # Directory where temporary dry run preview files are stored.
  directory: ""

# -----------------------------------------------------------------------------
# Scheduling
# -----------------------------------------------------------------------------
scheduling:
  # Frequency: "daily", "weekly", or "monthly"
  frequency: "weekly"

  # Time in 24-hour format.
  time: "20:00"

# -----------------------------------------------------------------------------
# Email Notifications (Optional)
# -----------------------------------------------------------------------------
notifications:
  # Email address to receive sync notifications.
  # Leave blank to disable email notifications entirely.
  # The tool will function normally without email configured.
  recipient_email: ""

# -----------------------------------------------------------------------------
# Scoring Configuration
# -----------------------------------------------------------------------------
scoring:
  # For Excel users: how scoring criteria are referenced.
  # Options: "linked_workbook" or "embedded_sheet"
  excel_scoring_mode: "linked_workbook"

  # Path to the external scoring criteria workbook (for linked_workbook mode).
  scoring_workbook_path: ""
