# =============================================================================
# archivesspace-accession-sync Credentials
# =============================================================================
# IMPORTANT: This file contains sensitive information.
#   - Do NOT commit this file to version control.
#   - Do NOT share this file publicly.
#   - The real credentials.yml is listed in .gitignore.
#
# To set up:
#   1. Copy this file:  cp credentials_example.yml credentials.yml
#   2. Edit credentials.yml with your actual credentials.
# =============================================================================

# -----------------------------------------------------------------------------
# ArchivesSpace Credentials
# -----------------------------------------------------------------------------
archivesspace:
  username: "your_username_here"
  password: "your_password_here"

# -----------------------------------------------------------------------------
# Google API Credentials (only needed for Google Sheets output)
# -----------------------------------------------------------------------------
# Choose ONE authentication method below.

# Option A: Service Account (recommended for automated/scheduled runs)
# This requires a Google Cloud project with a service account.
# See docs/google_cloud_setup.md for step-by-step instructions.
google:
  auth_method: "service_account"
  service_account_key_path: "/path/to/your/service-account-key.json"

# Option B: OAuth (for institutions where service accounts are restricted)
# Uncomment the lines below and comment out Option A.
# google:
#   auth_method: "oauth"
#   oauth_client_id: "your_client_id_here"
#   oauth_client_secret: "your_client_secret_here"
#   oauth_token_path: "/path/to/stored/token.json"

# -----------------------------------------------------------------------------
# SMTP Email Credentials (optional)
# -----------------------------------------------------------------------------
# Configure these if you want email notifications for sync results.
# Leave this section commented out to disable email notifications.
# The tool will function normally without email configured.
#
# smtp:
#   server: "smtp.your-institution.edu"
#   port: 587
#   username: "your_email@institution.edu"
#   password: "your_email_password_here"
