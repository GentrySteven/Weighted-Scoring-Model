# =============================================================================
# archivesspace-accession-sync Credentials
# =============================================================================
# IMPORTANT: Do NOT commit this file to version control.
# Copy to credentials.yml and fill in your actual credentials.
# =============================================================================

archivesspace:
  username: "your_username_here"
  password: "your_password_here"

# Google API - choose ONE method:
# Option A: Service account (recommended)
google:
  auth_method: "service_account"
  service_account_key_path: "/path/to/your/service-account-key.json"

# Option B: OAuth (uncomment and comment out Option A)
# google:
#   auth_method: "oauth"
#   oauth_client_id: "your_client_id"
#   oauth_client_secret: "your_client_secret"
#   oauth_token_path: "/path/to/stored/token.json"

# SMTP Email (optional)
# smtp:
#   server: "smtp.your-institution.edu"
#   port: 587
#   username: "your_email@institution.edu"
#   password: "your_email_password"
